<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinAura Checkout</title>
<header class="header">
    <a href="checkout.html">
        <img src="images/skinauralogo.jpg" alt="SkinAura Logo" class="logo">
    </a>
</header>

<style>

.header{
    width:100%;
    padding:15px 40px;
    display:flex;
    justify-content:flex-start;
    align-items:center;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
    width:120px;
    height:auto;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
background:#fff0f6;
color:#333;
}

.wrapper{
width:1200px;
margin:auto;
padding:40px 0;
}

/* breadcrumb */

.breadcrumb{
font-size:14px;
margin-bottom:30px;
color:#888;
}

.breadcrumb span{
color:lightcoral;
font-weight:600;
}

/* layout */

.checkout-container{
display:grid;
grid-template-columns:2fr 1fr;
gap: 40px;
}

/* form */

.checkout-form{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
border-top:4px solid lightcoral;
}

.section-title{
font-size:22px;
margin-bottom:20px;
color:lightcoral;
}

.row{
display:flex;
gap:20px;
}

.input-group{
margin-bottom:18px;
width:100%;
}

.input-group label{
font-size:14px;
display:block;
margin-bottom:6px;
}

.input-group input,
.input-group select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

.input-group input:focus,
.input-group select:focus{
outline:none;
border-color:lightcoral;
}

/* payment */

.payment-option{
border:1px solid #eee;
padding:14px;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
transition:.3s;
}

.payment-option:hover{
border-color:lightcoral;
background:#fff7fa;
}

/* order summary */

.order-summary{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
border-top:4px solid lightcoral;
height:fit-content;
}

.product{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
}

.product-info{
display:flex;
align-items:center;
gap:12px;
}

.product img{
width:50px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:15px;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:15px;
border-top:1px solid #eee;
padding-top:12px;
color:lightcoral;
}

/* button */

.place-order{
margin-top:25px;
width:100%;
padding:15px;
border:none;
background:rgb(236, 107, 107);
color:white;
font-size:16px;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.place-order:hover{
background:rgb(238, 82, 149);
}

/* responsive */

@media(max-width:1000px){

.wrapper{
width:90%;
}

.checkout-container{
grid-template-columns:1fr;
}

.row{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="breadcrumb">
     <span>Checkout</span>
</div>

<div class="checkout-container">

<!-- Billing Form -->

<div class="checkout-form">

<h2 class="section-title">Billing Details</h2>

<div class="row">

<div class="input-group">
<label>First Name</label>
<input type="text">
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text">
</div>

</div>

<div class="input-group">
<label>Street Address</label>
<input type="text">
</div>

<div class="row">

<div class="input-group">
<label>City</label>
<input type="text">
</div>

<div class="input-group">
<label>State</label>
<input type="text">
</div>

</div>

<div class="row">

<div class="input-group">
<label>Zip Code</label>
<input type="text">
</div>

<div class="input-group">
<label>Country</label>
<select>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
</select>
</div>

</div>

<div class="input-group">
<label>Email Address</label>
<input type="email">
</div>

<div class="input-group">
<label>Phone</label>
<input type="tel">
</div>

<h2 class="section-title">Payment Method</h2>

<div class="payment-option">
<input type="radio" name="payment"> Credit / Debit Card
</div>

<div class="payment-option">
<input type="radio" name="payment"> UPI Payment
</div>

<div class="payment-option">
<input type="radio" name="payment"> Cash on Delivery
</div>

</div>

<!-- Order Summary -->

<div class="order-summary">

<h2 class="section-title">Your Order</h2>

<div class="product">
<div class="product-info">
<img src="images/lipbalm.jpg">
<span>Lip Balm</span>
</div>
<span>$75</span>
</div>

<div class="product">
<div class="product-info">
<img src="images/micellarwater.jpg">
<span>Micellar Water</span>
</div>
<span>$54</span>
</div>

<hr style="margin:15px 0">

<div class="summary-row">
<span>Subtotal</span>
<span>$129</span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span>0</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span>$129</span>
</div>
<a href="confirmation.html">
<button class="place-order">PLACE ORDER</button>
</a>


<a href="home-02.html">← Back to home</a>
<!-- <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a> -->
</div>

</div>

</body>
</html>
